---
# Test files are validated by running them (go test -race), not by static
# complexity analysis. Production code stays fully analyzed.
exclude_paths:
  - "**/*_test.go"
  - "*_test.go"
  # The API reference (docs/API.md) legitimately repeats method-name headings
  # (e.g. render on different objects → MD024) and uses tables (MD060), which
  # markdownlint flags; doccov validates its substance instead. README.md stays
  # linted (it is the front page).
  - "docs/**"
